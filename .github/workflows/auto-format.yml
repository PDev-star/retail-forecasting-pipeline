name: Auto-format code

on:
  push:
    branches: [ develop, GitConnectionTest ]

jobs:
  format:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ github.head_ref }}
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install formatting tools
      run: |
        pip install black isort
    
    - name: Run black
      run: |
        black fastapi-gateway/ streamlit-app/ --exclude venv --line-length=120
    
    - name: Run isort
      run: |
        isort fastapi-gateway/ streamlit-app/ --skip venv --profile black
    
    - name: Check for changes
      id: verify-changed-files
      run: |
        if [[ -n $(git status --porcelain) ]]; then
          echo "changed=true" >> $GITHUB_OUTPUT
        else
          echo "changed=false" >> $GITHUB_OUTPUT
        fi
    
    - name: Commit and push changes
      if: steps.verify-changed-files.outputs.changed == 'true'
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add -A
        git commit -m "style: auto-format code with black and isort [skip ci]"
        git push
