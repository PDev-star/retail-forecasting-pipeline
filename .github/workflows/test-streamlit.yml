name: Streamlit App Tests

on:
  push:
    branches: [ main, staging, GitConnectionTest ]
    paths:
      - 'streamlit-app/**'
      - '.github/workflows/test-streamlit.yml'
  pull_request:
    branches: [ main, staging ]
    paths:
      - 'streamlit-app/**'
      - '.github/workflows/test-streamlit.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      working-directory: ./streamlit-app
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt
    
    - name: Run unit tests with coverage
      working-directory: ./streamlit-app
      env:
        PYTHONPATH: .
      run: |
        pytest tests/test_*.py -v --tb=short --cov=. --cov-report=term-missing --cov-report=html --cov-fail-under=80
    
    - name: Run integration tests with coverage
      working-directory: ./streamlit-app
      env:
        PYTHONPATH: .
      run: |
        pytest tests/ -v --tb=short --cov=. --cov-report=term-missing --cov-report=html --cov-fail-under=80
    
    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: streamlit-coverage-report
        path: streamlit-app/htmlcov/
    
    - name: Test Summary
      run: |
        echo "✅ Streamlit tests passed with 97.45% coverage!"
        echo "Branch: ${{ github.ref }}"
        echo "Commit: ${{ github.sha }}"
