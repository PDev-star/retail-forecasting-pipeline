name: Deploy to Production

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # Allows manual trigger

jobs:
  # ============================================================
  # DEPLOYMENT (Only runs if all tests passed in other workflows)
  # ============================================================
  
  deploy-production:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Production Deployment Notice
      run: |
        echo "🚀 Deploying to Production Environment"
        echo "Branch: ${{ github.ref }}"
        echo "Commit: ${{ github.sha }}"
        echo "Author: ${{ github.actor }}"
        echo ""
        echo "⚠️  This workflow assumes tests passed in test-*.yml workflows"
        echo "   GitHub branch protection rules should enforce this"
    
    - name: Deploy FastAPI to Render Production
      env:
        RENDER_PROD_DEPLOY_HOOK: ${{ secrets.RENDER_PROD_DEPLOY_HOOK }}
      run: |
        if [ -z "$RENDER_PROD_DEPLOY_HOOK" ]; then
          echo "❌ RENDER_PROD_DEPLOY_HOOK secret not set!"
          echo "   Add your Render deploy hook to GitHub secrets"
          echo "   Get it from: Render Dashboard → Your Service → Settings → Deploy Hook"
          exit 1
        fi
        
        echo "🚀 Triggering Render production deployment..."
        curl -X POST "$RENDER_PROD_DEPLOY_HOOK"
        echo "✅ Render deployment triggered"
    
    - name: Deployment Summary
      run: |
        echo ""
        echo "🎉 Production Deployment Complete!"
        echo ""
        echo "📦 What was deployed:"
        echo "  • FastAPI → Render (via deploy hook)"
        echo "  • Streamlit → Auto-deploys from GitHub"
        echo ""
        echo "⏱️  Expected deployment time: 5-10 minutes"
        echo ""
        echo "🔍 Verify deployment:"
        echo "  • FastAPI: ${{ secrets.FASTAPI_PROD_URL }}/docs"
        echo "  • Streamlit: https://retail-forecasting-pipeline.streamlit.app"
        echo ""
        echo "💡 Tip: Test manually after deployment to verify production"
