name: Deploy to Production

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # Allows manual trigger

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Production Deployment Notice
      run: |
        echo "🚀 Deploying to Production Environment"
        echo "Branch: ${{ github.ref }}"
        echo "Commit: ${{ github.sha }}"
        echo "Author: ${{ github.actor }}"
    
    - name: Deploy Streamlit Production App
      env:
        STREAMLIT_PROD_DEPLOY_HOOK: ${{ secrets.STREAMLIT_PROD_DEPLOY_HOOK }}
      run: |
        if [ -z "$STREAMLIT_PROD_DEPLOY_HOOK" ]; then
          echo "⚠️  STREAMLIT_PROD_DEPLOY_HOOK secret not set"
          echo "   Streamlit will auto-deploy when it detects push to main"
          echo "   To manually trigger, add deploy hook to GitHub secrets"
        else
          echo "🚀 Triggering Streamlit production deployment..."
          curl -X POST "$STREAMLIT_PROD_DEPLOY_HOOK"
          echo "✅ Streamlit production deployment triggered"
        fi
    
    - name: Deploy FastAPI Production Service
      env:
        RENDER_PROD_DEPLOY_HOOK: ${{ secrets.RENDER_PROD_DEPLOY_HOOK }}
      run: |
        if [ -z "$RENDER_PROD_DEPLOY_HOOK" ]; then
          echo "⚠️  RENDER_PROD_DEPLOY_HOOK secret not set"
          echo "   Render will auto-deploy when it detects push to main"
          echo "   To manually trigger, add deploy hook to GitHub secrets"
        else
          echo "🚀 Triggering Render production deployment..."
          curl -X POST "$RENDER_PROD_DEPLOY_HOOK"
          echo "✅ Render production deployment triggered"
        fi
    
    - name: Deployment Summary
      run: |
        echo ""
        echo "🎉 Production Deployment Initiated!"
        echo ""
        echo "📦 Monitor deployments at:"
        echo "  • Streamlit: https://share.streamlit.io"
        echo "  • Render: https://dashboard.render.com"
        echo ""
        echo "⏱️  Expected deployment time: 5-10 minutes"
        echo ""
        echo "🔍 Verify deployment:"
        echo "  • Streamlit App: https://retail-forecasting-pipeline.streamlit.app"
        echo "  • FastAPI Docs: https://your-api.onrender.com/docs"
