name: Deploy to Staging

# This workflow WAITS for BOTH test workflows to complete
# It will only run after test-fastapi.yml AND test-streamlit.yml finish
# If either test fails, this workflow fails too (no deployment)
on:
  workflow_run:
    workflows: ["Test FastAPI", "Streamlit App Tests"]
    types: [completed]
    branches: [develop, staging, GitConnectionTest]

jobs:
  # ============================================================
  # CHECK THAT BOTH TEST WORKFLOWS PASSED
  # ============================================================
  
  check-tests:
    runs-on: ubuntu-latest
    # Fail immediately if the triggering workflow failed
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    outputs:
      both-passed: ${{ steps.check-both.outputs.passed }}
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Check Both Test Workflows
      id: check-both
      uses: actions/github-script@v7
      with:
        script: |
          // The workflow_run event only tells us about ONE workflow
          // We need to check if BOTH FastAPI and Streamlit tests passed
          
          const commit_sha = context.payload.workflow_run.head_sha;
          console.log(`Checking tests for commit: ${commit_sha}`);
          
          // Get all workflow runs for this commit
          const { data: runs } = await github.rest.actions.listWorkflowRunsForRepo({
            owner: context.repo.owner,
            repo: context.repo.repo,
            head_sha: commit_sha,
            per_page: 100
          });
          
          // Find FastAPI and Streamlit test runs
          const fastapiRun = runs.workflow_runs.find(r => 
            r.name === 'Test FastAPI' && r.head_sha === commit_sha
          );
          const streamlitRun = runs.workflow_runs.find(r => 
            r.name === 'Streamlit App Tests' && r.head_sha === commit_sha
          );
          
          console.log('FastAPI Test:', fastapiRun ? fastapiRun.conclusion : 'NOT FOUND');
          console.log('Streamlit Test:', streamlitRun ? streamlitRun.conclusion : 'NOT FOUND');
          
          // Check if both exist and passed
          const fastapi_passed = fastapiRun && fastapiRun.conclusion === 'success';
          const streamlit_passed = streamlitRun && streamlitRun.conclusion === 'success';
          
          if (!fastapiRun) {
            console.log('❌ FastAPI test run not found for this commit');
            core.setFailed('FastAPI tests did not run');
            return;
          }
          
          if (!streamlitRun) {
            console.log('❌ Streamlit test run not found for this commit');
            core.setFailed('Streamlit tests did not run');
            return;
          }
          
          if (!fastapi_passed) {
            console.log('❌ FastAPI tests FAILED');
            core.setFailed('FastAPI tests failed');
            return;
          }
          
          if (!streamlit_passed) {
            console.log('❌ Streamlit tests FAILED');
            core.setFailed('Streamlit tests failed');
            return;
          }
          
          console.log('✅ Both test workflows PASSED');
          core.setOutput('passed', 'true');
    
    - name: Test Status Summary
      run: |
        echo "📊 Test Status Summary:"
        echo "  Commit: ${{ github.event.workflow_run.head_sha }}"
        echo "  ✅ FastAPI Tests: PASSED"
        echo "  ✅ Streamlit Tests: PASSED"
        echo ""
        echo "🚀 Ready for deployment!"
  
  # ============================================================
  # DEPLOYMENT (Only runs if ALL tests passed)
  # ============================================================
  
  deploy-staging:
    needs: check-tests
    runs-on: ubuntu-latest
    # This job only runs if check-tests succeeded
    # check-tests fails if any test failed, so this is safe
    
    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ github.event.workflow_run.head_sha }}
    
    - name: Staging Deployment Notice
      run: |
        echo "🚀 Deploying to Staging Environment"
        echo "Branch: ${{ github.event.workflow_run.head_branch }}"
        echo "Commit: ${{ github.event.workflow_run.head_sha }}"
        echo ""
        echo "✅ Both FastAPI and Streamlit tests passed"
        echo "   Ready for deployment!"
    
    - name: Deploy FastAPI to Render Staging
      env:
        RENDER_DEV_DEPLOY_HOOK: ${{ secrets.RENDER_DEV_DEPLOY_HOOK }}
      run: |
        if [ -z "$RENDER_DEV_DEPLOY_HOOK" ]; then
          echo "⚠️  RENDER_DEV_DEPLOY_HOOK not set"
          echo "   Render will auto-deploy when it detects push"
          exit 0
        fi
        
        echo "🚀 Triggering Render staging deployment..."
        curl -X POST "$RENDER_DEV_DEPLOY_HOOK"
        echo "✅ Render deployment triggered"
    
    - name: Deployment Summary
      run: |
        echo ""
        echo "🎉 Staging Deployment Complete!"
        echo ""
        echo "📦 What was deployed:"
        echo "  • FastAPI → Render Dev (via deploy hook)"
        echo "  • Streamlit → Auto-deploys from GitHub"
        echo ""
        echo "🔍 Staging URLs:"
        echo "  • FastAPI: ${{ secrets.FASTAPI_DEV_URL }}/docs"
        echo "  • Streamlit: https://retail-forecasting-pipeline-dev.streamlit.app"
