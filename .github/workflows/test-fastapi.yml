name: FastAPI Gateway Tests

on:
  push:
    branches: [ main, staging, GitConnectionTest ]
    paths:
      - 'fastapi-gateway/**'
      - '.github/workflows/test-fastapi.yml'
  pull_request:
    branches: [ main, staging ]
    paths:
      - 'fastapi-gateway/**'
      - '.github/workflows/test-fastapi.yml'

jobs:
  # ============================================================
  # UNIT TESTS ONLY (No deployment - deploy-staging.yml handles that)
  # ============================================================
  
  unit-tests:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        cd fastapi-gateway
        pip install -r requirements.txt
        pip install -r requirements-dev.txt
    
    - name: Run FastAPI unit tests
      run: |
        cd fastapi-gateway
        pytest tests/ -v --tb=short
    
    - name: Test Summary
      run: |
        echo ""
        echo "✅ FastAPI unit tests passed!"
        echo ""
        echo "📊 Changes detected in: fastapi-gateway/"
        echo "🔄 Deploy-staging workflow will handle deployment"
