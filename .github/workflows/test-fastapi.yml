name: FastAPI Gateway Tests

on:
  push:
    branches: [ GitConnectionTest, main, staging ]
  pull_request:
    branches: [ main, staging ]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        cd fastapi-gateway
        pip install -r requirements.txt
        pip install -r requirements-dev.txt
    
    - name: Run FastAPI unit tests with coverage
      run: |
        cd fastapi-gateway
        pytest tests/ -v --tb=short \
          --cov=. --cov-report=term --cov-report=html
    
    - name: Check coverage threshold
      run: |
        cd fastapi-gateway
        coverage report --fail-under=80
    
    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      with:
        name: fastapi-coverage-report
        path: fastapi-gateway/htmlcov/
    
    - name: Test Summary
      run: |
        echo "✅ FastAPI unit tests passed with coverage above 80%!"
